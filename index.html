<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>만트라 아트 - 당신의 그림을 읽습니다</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Noto+Sans+KR:wght@300;400;500&family=Cormorant:ital,wght@0,300;0,400;1,300;1,400&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<style>
  :root {
    --ink: #1e1e2a;
    --bg-color: #F5F2EE;
    --accent: #8B6F8E;
    --accent-hover: #7a5f7d;
    --gold: #C4956A;
    --sage: #7A9E87;
    --rose: #C17F88;
    --line: rgba(30, 30, 42, 0.12);
    --shadow: rgba(0, 0, 0, 0.06);
    --muted: #8B8598;
    --surface: #FFFCF9;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg-color);
    color: var(--ink);
    font-family: 'Noto Sans KR', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Artistic grain + subtle pattern */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: 
      url("data:image/svg+xml,%3Csvg viewBox='0 0 400 400' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.75' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.025'/%3E%3C/svg%3E");
    pointer-events: none;
    z-index: 0;
  }

  body::after {
    content: '';
    position: fixed;
    top: -200px;
    right: -200px;
    width: 600px;
    height: 600px;
    background: radial-gradient(circle, rgba(139,111,142,0.06) 0%, transparent 70%);
    pointer-events: none;
    z-index: 0;
  }

  /* Header */
  header {
    padding: 72px 48px 56px;
    text-align: left;
    max-width: 1000px;
    margin: 0 auto;
    position: relative;
    z-index: 1;
  }

  /* Decorative line above logo */
  header::before {
    content: '';
    display: block;
    width: 48px;
    height: 2px;
    background: linear-gradient(90deg, var(--accent), var(--rose));
    margin-bottom: 28px;
  }

  .logo-ornament {
    font-family: 'Cormorant', serif;
    font-size: 13px;
    font-weight: 400;
    letter-spacing: 0.22em;
    color: var(--accent);
    margin-bottom: 28px;
    display: inline-flex;
    align-items: center;
    gap: 10px;
    text-transform: uppercase;
  }

  .logo-ornament span {
    display: inline-block;
    width: 24px;
    height: 1px;
    background: var(--accent);
    opacity: 0.5;
  }

  h1 {
    font-family: 'Cormorant Garamond', serif;
    font-size: clamp(24px, 3vw, 36px);
    font-weight: 400;
    letter-spacing: 0.03em;
    line-height: 1.3;
    color: var(--ink);
    margin-bottom: 28px;
  }

  h1 em {
    font-style: normal;
    font-weight: 400;
    color: var(--accent);
    letter-spacing: 0.03em;
  }

  h1 em::after {
    display: none;
  }

  .subtitle {
    font-family: 'Noto Sans KR', sans-serif;
    font-size: 16px;
    font-weight: 300;
    color: var(--muted);
    letter-spacing: 0.01em;
    text-align: right;
    max-width: 75%;
    margin-left: auto;
    margin-top: 20px;
    border-top: 1px solid var(--line);
    padding-top: 18px;
  }

  /* Main layout */
  main {
    max-width: 900px;
    margin: 0 auto;
    padding: 40px 24px 100px;
  }

  /* Upload Zone - Minimalist */
  .upload-section {
    text-align: center;
    margin-bottom: 60px;
  }

  .upload-zone {
    border: 1px solid var(--line);
    border-radius: 2px;
    padding: 80px 40px;
    cursor: pointer;
    transition: all 0.5s ease;
    background: var(--surface);
    position: relative;
    overflow: hidden;
    margin-bottom: 32px;
  }

  /* Corner accents */
  .upload-zone::before {
    content: '';
    position: absolute;
    top: 12px;
    left: 12px;
    right: 12px;
    bottom: 12px;
    border: 1px dashed rgba(139,111,142,0.2);
    border-radius: 1px;
    pointer-events: none;
    transition: border-color 0.5s ease;
  }

  .upload-zone:hover {
    border-color: var(--accent);
    box-shadow: 0 8px 48px rgba(139,111,142,0.12);
  }

  .upload-zone:hover::before {
    border-color: rgba(139,111,142,0.4);
  }

  .upload-zone.drag-over {
    border-color: var(--accent);
    background: rgba(139,111,142,0.04);
    box-shadow: 0 16px 64px rgba(139,111,142,0.15);
  }

  .upload-icon {
    margin: 0 auto 24px;
    opacity: 0.5;
    transition: opacity 0.3s ease;
  }

  .upload-zone:hover .upload-icon { opacity: 0.8; }

  .upload-title {
    font-family: 'DM Serif Display', serif;
    font-size: 22px;
    font-weight: 400;
    font-style: italic;
    color: var(--ink);
    margin-bottom: 12px;
  }

  .upload-desc {
    font-size: 12px;
    font-weight: 300;
    color: var(--muted);
    letter-spacing: 0.06em;
  }

  #fileInput { display: none; }

  /* Preview */
  .preview-container {
    display: none;
    margin-top: 32px;
    text-align: center;
  }

  .preview-frame {
    display: inline-block;
    position: relative;
    padding: 10px;
    background: var(--surface);
    box-shadow: 0 12px 48px rgba(30,30,42,0.10), 0 2px 8px rgba(30,30,42,0.05);
  }

  .preview-frame::before {
    content: '';
    position: absolute;
    inset: 3px;
    border: 1px solid rgba(139,111,142,0.15);
  }

  .preview-frame::after {
    content: '';
    position: absolute;
    inset: 6px;
    border-color: rgba(196,149,106,0.08);
  }

  #previewImg {
    max-width: 100%;
    max-height: 400px;
    display: block;
    position: relative;
    z-index: 1;
  }

  .preview-caption {
    margin-top: 12px;
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 0.1em;
  }

  /* Analyze Button */
  .analyze-buttons {
    display: flex;
    gap: 16px;
    justify-content: center;
    margin-top: 40px;
    flex-wrap: wrap;
  }

  .btn-analyze {
    display: block;
    padding: 16px 44px;
    background: transparent;
    color: var(--ink);
    border: 1px solid var(--ink);
    border-radius: 0;
    cursor: pointer;
    font-family: 'Noto Sans KR', sans-serif;
    font-size: 14px;
    font-weight: 400;
    letter-spacing: 0.08em;
    transition: all 0.4s ease;
    position: relative;
    overflow: hidden;
    z-index: 1;
  }

  .btn-analyze::before {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(135deg, var(--accent), var(--rose));
    z-index: -1;
    transform: scaleX(0);
    transform-origin: right;
    transition: transform 0.4s cubic-bezier(0.77,0,0.175,1);
  }

  .btn-analyze:hover:not(:disabled) {
    color: white;
    border-color: var(--accent);
    letter-spacing: 0.12em;
  }

  .btn-analyze:hover:not(:disabled)::before {
    transform: scaleX(1);
    transform-origin: left;
  }

  .btn-analyze:disabled {
    border-color: var(--line);
    color: #b0a8b8;
    cursor: not-allowed;
  }

  /* Loading */
  .loading-section {
    display: none;
    text-align: center;
    padding: 60px 0;
  }

  .loading-ornament {
    width: 56px;
    height: 56px;
    margin: 0 auto 28px;
    border: 1px solid var(--line);
    border-top-color: var(--accent);
    border-right-color: var(--rose);
    border-radius: 50%;
    animation: spin 2s linear infinite;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  .loading-text {
    font-family: 'Cormorant', serif;
    font-style: italic;
    font-size: 18px;
    color: var(--ink);
    letter-spacing: 0.05em;
  }

  .loading-steps {
    margin-top: 12px;
    font-size: 12px;
    font-family: 'Noto Sans KR', sans-serif;
    color: var(--muted);
    letter-spacing: 0.08em;
    min-height: 20px;
  }

  /* Report */
  .report-section {
    display: none;
    animation: fadeUp 0.8s ease forwards;
    background: var(--surface);
    width: 210mm;
    max-width: 100%;
    margin: 0 auto;
    padding: 20mm;
    box-shadow: 0 8px 48px rgba(30,30,42,0.08);
    position: relative;
    box-sizing: border-box;
    border: 1px solid var(--line);
    border-radius: 0;
  }

  /* Decorative top accent */
  .report-section::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 3px;
    background: linear-gradient(90deg, var(--sage), var(--accent), var(--rose));
  }

  @media (max-width: 210mm) {
    .report-section {
      width: 100%;
      padding: 32px 24px;
      border-radius: 0;
      border-left: none;
      border-right: none;
    }
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(40px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .report-header {
    text-align: center;
    padding: 24px 0 52px;
    border-bottom: 1px solid var(--line);
    margin-bottom: 52px;
    position: relative;
  }

  .report-badge {
    font-family: 'Cormorant', serif;
    font-size: 11px;
    font-weight: 400;
    letter-spacing: 0.28em;
    color: var(--accent);
    text-transform: uppercase;
    margin-bottom: 22px;
    display: inline-block;
  }

  .report-title {
    font-family: 'DM Serif Display', serif;
    font-size: clamp(28px, 4.5vw, 42px);
    font-weight: 400;
    font-style: italic;
    line-height: 1.2;
    color: var(--ink);
    margin-bottom: 18px;
    letter-spacing: -0.01em;
  }

  .report-date {
    font-family: 'Noto Sans KR', sans-serif;
    font-weight: 300;
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 0.14em;
    text-transform: uppercase;
  }

  /* Sections */
  .report-body {
    display: grid;
    gap: 0;
  }

  .report-block {
    padding: 50px 0;
    border-bottom: 1px solid var(--line);
    display: grid;
    grid-template-columns: 200px 1fr;
    gap: 40px;
    align-items: start;
    page-break-inside: avoid;
  }

  @media (max-width: 640px) {
    .report-block {
      grid-template-columns: 1fr;
      gap: 20px;
      padding: 40px 0;
    }
  }

  .block-label {
    font-family: 'Cormorant', serif;
    font-size: 11px;
    font-weight: 400;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--accent);
    padding-top: 6px;
    position: relative;
  }

  .block-label::after {
    content: '';
    display: block;
    width: 18px;
    height: 1px;
    background: linear-gradient(90deg, var(--accent), var(--rose));
    margin-top: 16px;
    opacity: 0.7;
  }

  .block-content h3 {
    font-family: 'DM Serif Display', serif;
    font-size: 22px;
    font-weight: 400;
    color: var(--ink);
    margin-bottom: 18px;
    line-height: 1.3;
  }

  .block-content p {
    font-family: 'Noto Sans KR', sans-serif;
    font-size: 14px;
    font-weight: 300;
    line-height: 2;
    color: #3d3548;
  }

  .block-content p + p {
    margin-top: 14px;
  }

  /* Keyword tags */
  .keyword-tags {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    margin-top: 24px;
  }

  .tag {
    padding: 5px 14px;
    border: 1px solid rgba(139,111,142,0.3);
    font-size: 11px;
    font-weight: 400;
    color: var(--accent);
    background: rgba(139,111,142,0.05);
    font-family: 'Noto Sans KR', sans-serif;
    letter-spacing: 0.04em;
    border-radius: 0;
  }

  /* Score bar */
  .score-grid {
    display: grid;
    gap: 14px;
    margin-top: 8px;
  }

  .score-item {
    display: grid;
    grid-template-columns: 120px 1fr 40px;
    align-items: center;
    gap: 16px;
  }

  .score-name {
    font-size: 13px;
    font-weight: 400;
    color: var(--muted);
    letter-spacing: 0.02em;
  }

  .score-bar-bg {
    height: 2px;
    background: var(--line);
    position: relative;
    overflow: hidden;
    border-radius: 1px;
  }

  .score-bar-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--sage), var(--accent));
    width: 0%;
    transition: width 1.4s cubic-bezier(0.25, 1, 0.5, 1);
  }

  .score-val {
    font-family: 'Cormorant', serif;
    font-weight: 400;
    font-size: 18px;
    color: var(--accent);
    text-align: right;
  }

  /* Solution cards */
  .solution-list {
    display: grid;
    gap: 16px;
    margin-top: 8px;
  }

  .solution-card {
    padding: 28px 32px;
    background: var(--surface);
    border: 1px solid var(--line);
    border-left: 3px solid var(--accent);
    box-shadow: 0 4px 24px rgba(30,30,42,0.05);
    position: relative;
    overflow: hidden;
  }

  .solution-card::before {
    content: '';
    position: absolute;
    top: 0; right: 0;
    width: 80px; height: 80px;
    background: radial-gradient(circle at top right, rgba(139,111,142,0.06), transparent 70%);
  }

  .solution-card .sol-num {
    font-family: 'Cormorant', serif;
    font-size: 11px;
    font-weight: 400;
    letter-spacing: 0.18em;
    color: var(--rose);
    display: block;
    margin-bottom: 10px;
    text-transform: uppercase;
  }

  .solution-card .sol-title {
    font-family: 'DM Serif Display', serif;
    font-size: 18px;
    font-weight: 400;
    color: var(--ink);
    margin-bottom: 12px;
  }

  .solution-card .sol-desc {
    font-family: 'Noto Sans KR', sans-serif;
    font-size: 13px;
    font-weight: 300;
    line-height: 2;
    color: #3d3548;
  }

  /* Footer quote */
  .report-footer {
    text-align: center;
    padding: 56px 0 40px;
  }

  .closing-line {
    font-family: 'DM Serif Display', serif;
    font-style: italic;
    font-size: 20px;
    color: var(--accent);
    line-height: 1.7;
  }

  .divider {
    width: 48px;
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--accent), transparent);
    margin: 40px auto;
  }

  /* Actions */
  .report-actions {
    display: flex;
    gap: 16px;
    justify-content: center;
    margin-top: 40px;
    flex-wrap: wrap;
  }
  
  @media print {
    .report-actions {
      display: none !important;
    }
  }

  .btn-action {
    display: block;
    padding: 14px 36px;
    background: transparent;
    color: var(--ink);
    border: 1px solid var(--ink);
    border-radius: 0;
    cursor: pointer;
    font-family: 'Noto Sans KR', sans-serif;
    font-weight: 400;
    font-size: 13px;
    letter-spacing: 0.08em;
    transition: all 0.4s ease;
    position: relative;
    overflow: hidden;
    z-index: 1;
  }

  .btn-action::before {
    content: '';
    position: absolute;
    inset: 0;
    background: var(--ink);
    z-index: -1;
    transform: scaleX(0);
    transform-origin: right;
    transition: transform 0.4s cubic-bezier(0.77,0,0.175,1);
  }

  .btn-action:hover {
    color: var(--bg-color);
    letter-spacing: 0.12em;
  }

  .btn-action:hover::before {
    transform: scaleX(1);
    transform-origin: left;
  }

  .btn-action.primary {
    background: var(--primary);
  }

  .btn-action.primary:hover {
    background: var(--primary-hover);
  }

  /* PDF Export Mode */
  .pdf-export-mode .report-block,
  .pdf-export-mode .score-bar-fill {
    opacity: 1 !important;
    transform: none !important;
    animation: none !important;
    transition: none !important;
  }
  .pdf-export-mode .report-section {
    animation: none !important;
  }

  /* Error */
  .error-box {
    display: none;
    padding: 20px 24px;
    border: 1px solid #e8a0a0;
    background: #fff8f8;
    color: #8b3030;
    font-size: 13px;
    margin-top: 24px;
    font-family: 'Noto Serif KR', serif;
  }



  /* Scroll reveal */
  .report-block { opacity: 0; transform: translateY(16px); }
  .report-block.visible { 
    animation: fadeUp 0.6s ease forwards; 
  }
  .report-block:nth-child(1) { animation-delay: 0.1s; }
  .report-block:nth-child(2) { animation-delay: 0.2s; }
  .report-block:nth-child(3) { animation-delay: 0.3s; }
  .report-block:nth-child(4) { animation-delay: 0.4s; }
  .report-block:nth-child(5) { animation-delay: 0.5s; }
  .report-block:nth-child(6) { animation-delay: 0.6s; }

  /* Context Input */
  .context-label {
    font-family: 'Cormorant Garamond', serif;
    font-style: normal;
    font-size: 17px;
    color: var(--accent);
    text-align: center;
    margin-bottom: 20px;
  }

  .context-fields {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 14px;
    max-width: 560px;
    margin: 0 auto;
  }

  .context-field {
    display: flex;
    flex-direction: column;
    gap: 6px;
  }

  .context-field--full {
    grid-column: 1 / -1;
  }

  .context-field label {
    font-family: 'Noto Sans KR', sans-serif;
    font-size: 11px;
    font-weight: 400;
    letter-spacing: 0.1em;
    color: var(--muted);
    text-transform: uppercase;
  }

  .context-input-field {
    width: 100%;
    padding: 12px 16px;
    border: 1px solid var(--line);
    border-bottom: 2px solid rgba(139,111,142,0.3);
    background: var(--surface);
    border-radius: 0;
    font-family: 'Noto Sans KR', sans-serif;
    font-size: 14px;
    font-weight: 300;
    color: var(--ink);
    outline: none;
    transition: all 0.3s;
  }

  .context-input-field:focus {
    border-color: transparent;
    border-bottom-color: var(--accent);
    background: white;
    box-shadow: 0 6px 24px rgba(139,111,142,0.08);
  }

  .context-input-field::placeholder {
    color: #c0b8c8;
    font-weight: 300;
  }

  .context-input-area {
    resize: vertical;
    min-height: 80px;
  }

  @media (max-width: 480px) {
    .context-fields { grid-template-columns: 1fr; }
    .context-field--full { grid-column: 1; }
  }
    width: 100%;
    max-width: 480px;
    margin: 0 auto;
    display: block;
    padding: 16px 20px;
    border: 1px solid var(--line);
    border-bottom: 2px solid var(--accent);
    background: var(--surface);
    border-radius: 0;
    font-family: 'Noto Sans KR', sans-serif;
    font-size: 14px;
    font-weight: 300;
    color: var(--ink);
    resize: vertical;
    outline: none;
    transition: all 0.3s;
  }
  .context-input:focus {
    border-color: transparent;
    border-bottom-color: var(--rose);
    background: white;
    box-shadow: 0 8px 32px rgba(193,127,136,0.1);
  }
  .context-input::placeholder {
    color: #c0b8c8;
    font-weight: 300;
  }
</style>
</head>
<body>

<header>
  <div class="logo-ornament"><span></span> Mantra Art <span></span></div>
  <h1>미술심리 분석·<em>솔루션 제공</em></h1>
  <p class="subtitle">그림 속에 담긴 심리를 읽고, 맞춤형 솔루션을 제안합니다</p>
</header>


<main>

  <!-- Upload Section -->
  <div class="upload-section" id="uploadSection">
    <div class="upload-zone" id="uploadZone">
      <div class="upload-icon">
      <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="var(--accent)" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
          <rect x="3" y="3" width="18" height="18" rx="1" ry="1"></rect>
          <circle cx="8.5" cy="8.5" r="1.5"></circle>
          <polyline points="21 15 16 10 5 21"></polyline>
        </svg>
      </div>
      <div class="upload-title">그림을 업로드하세요</div>
      <div class="upload-desc">드래그 앤 드롭 또는 클릭하여 선택 · JPG, PNG, WEBP, GIF 지원</div>
      <input type="file" id="fileInput" accept="image/*">
    </div>

    <div class="preview-container" id="previewContainer">
      <div class="preview-frame">
        <img id="previewImg" alt="업로드된 그림">
      </div>
      <p class="preview-caption">분석할 이미지가 준비되었습니다</p>
    </div>

    <!-- Optional Context Input -->
    <div class="context-container" id="contextContainer" style="margin-top: 32px;">

    <div class="loading-text">그림을 읽고 있습니다</div>

<script>
let uploadedImageBase64 = null;
let uploadedImageType = null;
let lastReportData = null;


// Upload zone interactions
const zone = document.getElementById('uploadZone');
const fileInput = document.getElementById('fileInput');

zone.addEventListener('click', () => fileInput.click());
zone.addEventListener('dragover', e => { e.preventDefault(); zone.classList.add('drag-over'); });
zone.addEventListener('dragleave', () => zone.classList.remove('drag-over'));
zone.addEventListener('drop', e => {
  e.preventDefault();
  zone.classList.remove('drag-over');
  const file = e.dataTransfer.files[0];
  if (file) handleFile(file);
});

fileInput.addEventListener('change', e => {
  if (e.target.files[0]) handleFile(e.target.files[0]);
});

function handleFile(file) {
  if (!file.type.startsWith('image/')) {
    showError('이미지 파일만 업로드 가능합니다.');
    return;
  }

  const reader = new FileReader();
  reader.onload = (e) => {
    const dataUrl = e.target.result;
    uploadedImageBase64 = dataUrl.split(',')[1];
    uploadedImageType = file.type;

    document.getElementById('previewImg').src = dataUrl;
    document.getElementById('uploadZone').style.display = 'none';
    document.getElementById('previewContainer').style.display = 'block';
    document.getElementById('infoName').value = '';
    document.getElementById('infoAge').value = '';
    document.getElementById('infoDesc').value = '';
    document.getElementById('analyzeEduBtn').disabled = false;
    document.getElementById('analyzeGenBtn').disabled = false;
    hideError();
  };
  reader.readAsDataURL(file);
}

function showError(msg) {
  const box = document.getElementById('errorBox');
  box.textContent = msg;
  box.style.display = 'block';
}

function hideError() {
  document.getElementById('errorBox').style.display = 'none';
}

async function analyzeImage(mode = 'general') {
  if (!uploadedImageBase64) return;

  // Show loading
  document.getElementById('uploadSection').style.display = 'none';
  document.getElementById('loadingSection').style.display = 'block';

  // Animate loading steps
  const steps = [
    '시각 요소 분석 중…',
    '색채 심리 해석 중…',
    '공간 구성 읽는 중…',
    '내면 상태 도출 중…',
    '솔루션 구성 중…',
    '보고서 작성 중…'
  ];
  let stepIdx = 0;
  const stepEl = document.getElementById('loadingSteps');
  const stepInterval = setInterval(() => {
    stepIdx = (stepIdx + 1) % steps.length;
    stepEl.textContent = steps[stepIdx];
  }, 1400);

  try {
    let systemPrompt = '';
    
    if (mode === 'education') {
      systemPrompt = `당신은 어린이 미술 심리 분석을 전문으로 하는 전문가입니다. 사용자가 업로드한 그림을 분석하여 다음 JSON 형식으로 학부모나 교육자가 보기에 적절한 전문가 보고서 형태로 응답하세요. 
주의: 상처가 될 수 있는 부정적이거나 극단적인 내용(우울증 심각, 스트레스 한계 등)은 절대 피하고, 성향과 잠재력을 밝고 긍정적인 방향으로 분석한 뒤에 맞춤형 성장 솔루션을 제공하세요. 필요 시 \\n 문자를 적극 활용해서 문단 구분을 확실히 해주세요.
{
  "title": "보고서 제목 (예: 상상력이 풍부한 캔버스)",
  "overview": "그림의 전반적인 특징 및 작가의 긍정적 성향 (2~3개 문단으로 상세히 기술)",
  "keywords": ["키워드1", "키워드2", "키워드3", "키워드4", "키워드5"],
  "elements": {
    "color": "색채 심리 분석 (성향과 잠재력 측면 긍정적 분석, 문단 구분 포함)",
    "composition": "공간 및 구도 분석 (상세히, 문단 구분 포함)",
    "form": "형태 및 선의 특징 분석 (상세히)",
    "symbol": "주요 상징물 분석 (상세히)"
  },
  "scores": [
    {"name": "창의성 지수", "value": "0~100 사이 숫자"},
    {"name": "호기심", "value": "0~100 사이 숫자"},
    {"name": "정서적 안정감", "value": "0~100 사이 숫자"},
    {"name": "사회성 발달", "value": "0~100 사이 숫자"}
  ],
  "core_state": "현재 작가의 발달 과정과 긍정적 성향에 대한 깊이 있는 심리 분석 (2~3개 문단으로 상세 기술)",
  "solutions": [
    {"title": "솔루션 1 제목", "description": "구체적이고 실천 가능한 맞춤형 조언 상세 설명"},
    {"title": "솔루션 2 제목", "description": "구체적이고 실천 가능한 맞춤형 조언 상세 설명"},
    {"title": "솔루션 3 제목", "description": "구체적이고 실천 가능한 맞춤형 조언 상세 설명"}
  ],
  "closing": "분석을 마무리하는 따뜻한 조언 한 마디"
}
오직 유효한 JSON 문자열만 반환하세요.`;
    } else {
      systemPrompt = `당신은 전문 미술 심리 분석가입니다. 사용자가 업로드한 그림을 분석하여 다음 JSON 형식으로 정확하게, 하지만 내용이 매우 깊이 있고 양식을 갖춘 전문가 보고서 형태로 응답하세요. 필요 시 \\n 문자를 적극 활용해서 문단 구분을 확실히 해주세요.
{
  "title": "보고서 제목 (예: 내면의 소리에 귀 기울이는 시간)",
  "overview": "그림의 전반적인 특징 및 첫인상 (2~3개 문단으로 상세히 기술)",
  "keywords": ["키워드1", "키워드2", "키워드3", "키워드4", "키워드5"],
  "elements": {
    "color": "색채 심리 분석 (상세히, 문단 구분 포함)",
    "composition": "공간 및 구도 분석 (상세히, 문단 구분 포함)",
    "form": "형태 및 선의 특징 분석 (상세히)",
    "symbol": "주요 상징물 분석 (상세히)"
  },
  "scores": [
    {"name": "스트레스 지수", "value": "0~100 사이 숫자"},
    {"name": "우울감", "value": "0~100 사이 숫자"},
    {"name": "활동성", "value": "0~100 사이 숫자"},
    {"name": "자아 존중감", "value": "0~100 사이 숫자"}
  ],
  "core_state": "현재 내면 상태에 대한 깊이 있는 심리 분석 (2~3개 문단으로 상세 기술)",
  "solutions": [
    {"title": "솔루션 1 제목", "description": "구체적이고 실천 가능한 치유 솔루션 또는 조언 상세 설명"},
    {"title": "솔루션 2 제목", "description": "구체적이고 실천 가능한 치유 솔루션 또는 조언 상세 설명"},
    {"title": "솔루션 3 제목", "description": "구체적이고 실천 가능한 치유 솔루션 또는 조언 상세 설명"}
  ],
  "closing": "분석을 마무리하는 따뜻하고 가장 핵심적인 조언 한 마디"
}
오직 유효한 JSON 문자열만 반환하세요.`;
    }

    const infoName = document.getElementById('infoName').value.trim();
    const infoAge  = document.getElementById('infoAge').value.trim();
    const infoDesc = document.getElementById('infoDesc').value.trim();
    let userPrompt = "이 그림을 미술 심리학적 관점에서 분석해주세요.";
    const extras = [];
    if (infoName) extras.push(`이름: ${infoName}`);
    if (infoAge)  extras.push(`나이: ${infoAge}`);
    if (infoDesc) extras.push(`그림 설명: ${infoDesc}`);
    if (extras.length > 0) {
      userPrompt += `\n\n[부가 정보 (분석 시 참고하세요)]\n${extras.join('\n')}`;
    }

    const payload = {
      model: "gpt-4o",
      messages: [
        {
          role: "system",
          content: systemPrompt
        },
        {
          role: "user",
          content: [
            { type: "text", text: userPrompt },
            {
              type: "image_url",
              image_url: {
                url: `data:${uploadedImageType};base64,${uploadedImageBase64}`
              }
            }
          ]
        }
      ],
      response_format: { type: "json_object" },
      max_tokens: 2500,
      temperature: 0.7
    };

    const response = await fetch('/api/chat', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json'
      },
      body: JSON.stringify(payload)
    });

    clearInterval(stepInterval);

    if (!response.ok) {
      const err = await response.json();
      throw new Error(err.error?.message || '분석 중 오류가 발생했습니다.');
    }

    const resultData = await response.json();
    const resultText = resultData.choices[0].message.content;
    const result = JSON.parse(resultText);
    
    lastReportData = result;

    renderReport(result);

  } catch (err) {
    clearInterval(stepInterval);
    document.getElementById('loadingSection').style.display = 'none';
    document.getElementById('uploadSection').style.display = 'block';
    showError('분석 중 오류가 발생했습니다: ' + err.message);
  }
}

function formatText(text) {
  if (!text) return '';
  return text.replace(/\\n/g, '<br/>');
}

function renderReport(data) {
  document.getElementById('loadingSection').style.display = 'none';

  // Header
  document.getElementById('reportTitle').textContent = data.title || '미술심리분석 보고서';
  document.getElementById('reportDate').textContent = new Date().toLocaleDateString('ko-KR', {
    year: 'numeric', month: 'long', day: 'numeric'
  }) + ' · Mantra Art';
  document.getElementById('closingLine').textContent = data.closing || '';

  // Apply image
  const previewImg = document.getElementById('previewImg').src;
  document.getElementById('reportImage').src = previewImg;

  const body = document.getElementById('reportBody');
  body.innerHTML = '';

  // Block 1: Overview
  body.innerHTML += `
    <div class="report-block visible">
      <div class="block-label">개요<br>Overview</div>
      <div class="block-content">
        <h3>그림이 말하는 것</h3>
        <p>${formatText(data.overview)}</p>
        <div class="keyword-tags">
          ${(data.keywords || []).map(k => `<span class="tag">${k}</span>`).join('')}
        </div>
      </div>
    </div>`;

  // Block 2: Elements
  const el = data.elements || {};
  body.innerHTML += `
    <div class="report-block visible">
      <div class="block-label">시각 분석<br>Visual</div>
      <div class="block-content">
        <h3>색채 · 구성 · 형태의 심리학</h3>
        <p><strong style="font-weight:500;color:var(--accent)">색채 —</strong><br/>${formatText(el.color)}</p>
        <p><strong style="font-weight:500;color:var(--accent)">구성 —</strong><br/>${formatText(el.composition)}</p>
        <p><strong style="font-weight:500;color:var(--accent)">형태 —</strong><br/>${formatText(el.form)}</p>
        <p><strong style="font-weight:500;color:var(--accent)">상징 —</strong><br/>${formatText(el.symbol)}</p>
      </div>
    </div>`;

  // Block 3: Scores
  const scores = data.scores || [];
  body.innerHTML += `
    <div class="report-block visible" id="scoreBlock">
      <div class="block-label">심리 지수<br>Index</div>
      <div class="block-content">
        <h3>내면 상태 측정</h3>
        <div class="score-grid">
          ${scores.map(s => `
            <div class="score-item">
              <div class="score-name">${s.name}</div>
              <div class="score-bar-bg">
                <div class="score-bar-fill" data-val="${s.value}" style="width:0%"></div>
              </div>
              <div class="score-val">${s.value}</div>
            </div>`).join('')}
        </div>
      </div>
    </div>`;

  // Block 4: Core state
  body.innerHTML += `
    <div class="report-block visible">
      <div class="block-label">핵심 상태<br>Core State</div>
      <div class="block-content">
        <h3>지금 당신의 내면</h3>
        <p style="font-style:italic;font-family:'Cormorant',serif;font-size:16px;line-height:2.0;color:#3d3548;">${formatText(data.core_state)}</p>
      </div>
    </div>`;

  // Block 5: Solutions
  const sols = data.solutions || [];
  body.innerHTML += `
    <div class="report-block visible">
      <div class="block-label">솔루션<br>Solution</div>
      <div class="block-content">
        <h3>마음을 위한 처방</h3>
        <div class="solution-list">
          ${sols.map((s, i) => `
            <div class="solution-card">
              <div class="sol-num">0${i+1}</div>
              <div class="sol-title">${s.title}</div>
              <div class="sol-desc">${formatText(s.description)}</div>
            </div>`).join('')}
        </div>
      </div>
    </div>`;

  // Show
  document.getElementById('reportSection').style.display = 'block';

  // Animate score bars
  setTimeout(() => {
    document.querySelectorAll('.score-bar-fill').forEach(bar => {
      bar.style.width = bar.dataset.val + '%';
    });
  }, 400);

  // Scroll to top
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

  pw.document.write('</style></head><body>');
  pw.document.write('<div class="hdr"><h1>&#10022; Mantra Art &#10022;</h1>');

  pw.document.write('<div class="img-wrap"><img src="' + imgSrc + '" alt="분석 이미지"></div>');
  pw.document.write('<div class="sec"><h3>개요 &mdash; Overview</h3><p>' + nl(d.overview) + '</p></div>');
  pw.document.write('<div class="sec"><h3>시각 분석 &mdash; Visual</h3>');
  pw.document.write('<p><strong>색채 &mdash;</strong> ' + nl(el.color) + '</p>');
  pw.document.write('<p><strong>구성 &mdash;</strong> ' + nl(el.composition) + '</p>');
  pw.document.write('<p><strong>형태 &mdash;</strong> ' + nl(el.form) + '</p>');
  pw.document.write('<p><strong>상징 &mdash;</strong> ' + nl(el.symbol) + '</p></div>');
  pw.document.write('<div class="sec"><h3>심리 지수 &mdash; Index</h3><div class="sgrid">');
  scores.forEach(function(s){ pw.document.write('<div class="si"><strong>' + esc(s.name) + '</strong>: <span class="sv">' + esc(String(s.value)) + '</span></div>'); });
  pw.document.write('</div></div>');
  pw.document.write('<div class="sec"><h3>핵심 상태 &mdash; Core State</h3><p style="font-style:italic">' + nl(d.core_state) + '</p></div>');
  pw.document.write('<div class="sec"><h3>솔루션 &mdash; Solutions</h3>');
  sols.forEach(function(s,i){ pw.document.write('<div class="sol"><h4>0' + (i+1) + '. ' + esc(s.title) + '</h4><p>' + nl(s.description) + '</p></div>'); });
  pw.document.write('</div>');
  pw.document.write('<div class="closing">' + nl(d.closing) + '</div>');
  pw.document.write('<scr'+'ipt>window.onload=function(){setTimeout(function(){window.print();window.onafterprint=function(){window.close();};},800);};<\/scr'+'ipt>');
  pw.document.write('</body></html>');
  pw.document.close();
}

function exportWord() {
  if (!lastReportData) return;

  const d = lastReportData;
  const el = d.elements || {};
  const scores = d.scores || [];
  const sols = d.solutions || [];
  const imgSrc = document.getElementById('previewImg').src;

  const esc = function(s){ return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); };
  const nl  = function(s){ return (s||'').replace(/\\n/g,'<br>'); };

  const preHtml = `<html xmlns:o='urn:schemas-microsoft-com:office:office' xmlns:w='urn:schemas-microsoft-com:office:word' xmlns='http://www.w3.org/TR/REC-html40'>
<head>
<meta charset='utf-8'>
<title>미술심리분석 보고서</title>
<style>
  body { font-family: 'Malgun Gothic', 'Noto Sans KR', sans-serif; line-height: 1.6; color: #1a1410; }
  h2 { text-align: center; color: #b8934a; font-size: 20pt; margin-bottom: 20pt; font-weight: bold; }
  h3 { color: #b8934a; font-size: 14pt; font-weight: bold; border-bottom: 1px solid #ddd; padding-bottom: 5pt; margin-top: 25pt; margin-bottom: 10pt; }
  p { font-size: 11pt; margin-bottom: 8pt; color: #2a2018; }
  .img-container { text-align: center; margin-bottom: 20pt; }
  .score-item { margin-bottom: 6pt; font-size: 11pt; }
  .sol-item { margin-bottom: 15pt; }
  .sol-title { font-weight: bold; font-size: 12pt; margin-bottom: 5pt; color: #1a1410; }
  .closing { text-align: center; font-style: italic; color: #7a6e62; margin-top: 30pt; padding-top: 15pt; border-top: 1px solid #ddd; font-size: 11pt; }
</style>
</head>
<body>`;

  let contentHtml = `
    <h2>${esc(d.title || '미술심리분석 보고서')}</h2>
    
    <div class="img-container">
      <img src="${imgSrc}" style="width: 50%; max-width: 400px; height: auto;" alt="분석 이미지" />
    </div>
    
    <h3>개요</h3>
    <p>${nl(d.overview)}</p>

    <h3>시각 분석</h3>
    <p><strong>색채:</strong> ${nl(el.color)}</p>
    <p><strong>구성:</strong> ${nl(el.composition)}</p>
    <p><strong>형태:</strong> ${nl(el.form)}</p>
    <p><strong>상징:</strong> ${nl(el.symbol)}</p>

    <h3>심리 지수</h3>
  `;

  scores.forEach(s => {
    contentHtml += `<div class="score-item"><strong>${esc(s.name)}:</strong> ${esc(String(s.value))}</div>`;
  });

  contentHtml += `
    <h3>핵심 상태</h3>
    <p style="font-style: italic;">${nl(d.core_state)}</p>

    <h3>솔루션</h3>
  `;

  sols.forEach((s, i) => {
    contentHtml += `
      <div class="sol-item">
        <div class="sol-title">0${i+1}. ${esc(s.title)}</div>
        <p>${nl(s.description)}</p>
      </div>
    `;
  });

  contentHtml += `
    <div class="closing">${nl(d.closing)}</div>
  `;

  const postHtml = "</body></html>";
  const html = preHtml + contentHtml + postHtml;

  const blob = new Blob(['\\ufeff', html], { type: 'application/msword' });
  const url = URL.createObjectURL(blob);
  const filename = 'MantraArt_미술심리분석_보고서.doc';
  
  const downloadLink = document.createElement("a");
  document.body.appendChild(downloadLink);
  
  if (navigator.msSaveOrOpenBlob) {
    navigator.msSaveOrOpenBlob(blob, filename);
  } else {
    downloadLink.href = url;
    downloadLink.download = filename;
    downloadLink.click();
  }
  
  document.body.removeChild(downloadLink);
  URL.revokeObjectURL(url);
}
